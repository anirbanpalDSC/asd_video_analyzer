name: Deploy — Development

on:
  push:
    branches: [development]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy code to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "."
          target: "/tmp/asd-deploy-dev"

      - name: Install dependencies and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR=/opt/asd-analyzer-dev

            # Sync code (preserve uploads/ and processed/ on server)
            rsync -a --delete \
              --exclude='venv/' \
              --exclude='uploads/' \
              --exclude='processed/' \
              --exclude='__pycache__/' \
              --exclude='*.pyc' \
              /tmp/asd-deploy-dev/ \
              $DEPLOY_DIR/

            # Update Python dependencies
            $DEPLOY_DIR/venv/bin/pip install -q -r $DEPLOY_DIR/requirements.txt

            # Restart and verify
            sudo systemctl restart asd-analyzer-dev.service
            sudo systemctl is-active --quiet asd-analyzer-dev.service
            echo "Development deployed successfully."
