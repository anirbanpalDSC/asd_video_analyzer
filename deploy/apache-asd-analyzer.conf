# Apache virtual host config for ASD Video Analyzer
# Place in /etc/apache2/sites-available/ and enable with:
#   a2ensite apache-asd-analyzer.conf
#   a2enmod proxy proxy_http proxy_wstunnel rewrite headers
#   systemctl reload apache2
#
# This config assumes SSL is already handled on the ns.cht77.com VirtualHost.
# Add the Location blocks below inside your existing <VirtualHost *:443> for ns.cht77.com.

# ─── Production: https://ns.cht77.com → localhost:8501 ───────────────────────
#
# Inside your existing <VirtualHost *:443> block:

    # Streamlit WebSocket (must come before ProxyPass)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:8501/$1 [P,L]

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8501/
    ProxyPassReverse / http://127.0.0.1:8501/


# ─── Development: https://ns.cht77.com/dev → localhost:8502 ──────────────────
#
# Add inside the same <VirtualHost *:443> block, BEFORE the production ProxyPass:

    # Dev WebSocket (must come before ProxyPass /dev)
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/dev/(.*) ws://127.0.0.1:8502/dev/$1 [P,L]

    ProxyPass        /dev http://127.0.0.1:8502/dev
    ProxyPassReverse /dev http://127.0.0.1:8502/dev


# ─── Notes ────────────────────────────────────────────────────────────────────
# 1. Order matters: /dev ProxyPass blocks must come BEFORE the root / blocks.
# 2. The dev Streamlit instance is started with --server.baseUrlPath=/dev so all
#    its static assets and _stcore paths are served under /dev.
# 3. Uploaded files land in /opt/asd-analyzer{,-dev}/uploads/ — make sure
#    www-data owns those directories.
# 4. If Cloudflare Access is added in front, no additional Apache auth is needed.
